    <style>
        :root {
            --primary: #00786F;
            --primary-light: #00968A;
            --primary-dark: #005A54;
            --bg-light: #F8F9FA;
            --bg-white: #FFFFFF;
            --text-dark: #2A2A2A;
            --text-light: #6B6B6B;
            --success: #00786F;
            --error: #DC3545;
            --card-shadow: 0 2px 12px rgba(0, 120, 111, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: var(--bg-white);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }

        h1 {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 12px 32px;
            border: 2px solid var(--primary);
            background: var(--bg-white);
            color: var(--primary);
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            background: var(--primary-light);
            border-color: var(--primary-light);
            color: white;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Progress */
        .progress-section {
            max-width: 600px;
            margin: 0 auto 40px;
            padding: 24px;
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }

        .stats {
            text-align: center;
            margin-bottom: 16px;
            font-size: 1.1rem;
            color: var(--text-dark);
        }

        .stats strong {
            color: var(--primary);
        }

        .progress-bar {
            background: var(--bg-light);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Search */
        .search-container {
            max-width: 500px;
            margin: 0 auto 40px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            border: 2px solid var(--primary);
            border-radius: 24px;
            background: var(--bg-white);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            box-shadow: 0 0 0 4px rgba(0, 120, 111, 0.1);
        }

        /* Learning Mode - Cards Grid */
        #learningMode {
            display: block;
        }

        #learningMode.hidden {
            display: none;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-wrapper {
            perspective: 1000px;
            height: 200px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            box-shadow: var(--card-shadow);
        }

        .card-front {
            background: var(--primary);
            color: white;
        }

        .card-number {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 0.85rem;
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 12px;
        }

        .card-name {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
        }

        .card-back {
            background: var(--bg-white);
            transform: rotateY(180deg);
            border: 2px solid var(--primary);
        }

        .card-translation {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
            text-align: center;
        }

        .card-description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-light);
            text-align: center;
        }

        /* Quiz Mode */
        #quizMode {
            display: none;
        }

        #quizMode.active {
            display: block;
        }

        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .quiz-card {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        .quiz-score {
            background: var(--bg-light);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .quiz-score-text {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .quiz-score-number {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary);
        }

        .quiz-question {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .quiz-instruction {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 40px;
        }

        .quiz-options {
            display: grid;
            gap: 16px;
            margin-bottom: 24px;
        }

        .quiz-option {
            padding: 20px;
            border: 2px solid var(--primary);
            border-radius: 12px;
            background: var(--bg-white);
            color: var(--text-dark);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quiz-option:hover:not(.disabled) {
            background: rgba(0, 120, 111, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 120, 111, 0.15);
        }

        .quiz-option.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .quiz-option.incorrect {
            background: var(--error);
            color: white;
            border-color: var(--error);
        }

        .quiz-option.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        .quiz-result {
            margin-top: 24px;
            font-size: 1.2rem;
            min-height: 30px;
            font-weight: 500;
        }

        .quiz-result.correct {
            color: var(--success);
        }

        .quiz-result.incorrect {
            color: var(--error);
        }

        .quiz-next-btn {
            margin-top: 24px;
            padding: 14px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }

        .quiz-next-btn.active {
            display: inline-block;
        }

        .quiz-next-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 120, 111, 0.3);
        }

        /* Actions */
        .actions {
            text-align: center;
            margin-top: 40px;
        }

        .reset-btn {
            padding: 12px 32px;
            border: 2px solid var(--error);
            background: var(--bg-white);
            color: var(--error);
            border-radius: 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: var(--error);
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .quiz-question {
                font-size: 2.5rem;
            }

            .mode-toggle {
                flex-direction: column;
            }

            .quiz-card {
                padding: 24px;
            }
        }
    </style>
</head>

        </div>
    </div>

            { num: 85, name: "Аль-Муксит", translation: "Справедливый", desc: "Господь принимает справедливые решения." },
            { num: 86, name: "Аль-Джами", translation: "Интегрирующий", desc: "Всевышний объединяет всех Своих рабов." },
            { num: 87, name: "Аль-Гани", translation: "Обеспеченный всем", desc: "Аллах обладает богатствами и не нуждается ни в чём." },
            { num: 88, name: "Аль-Мугни", translation: "Дарующий богатства", desc: "Создатель обогащает кого пожелает." },
            { num: 89, name: "Аль-Мани", translation: "Ограждающий", desc: "Творец ограждает от благ кого пожелает." },
            { num: 90, name: "Ад-Дарр", translation: "Способный наслать бедствие", desc: "Господь посылает беды кому считает нужным." },
            { num: 91, name: "Ан-Нафи", translation: "Приносящий пользу", desc: "Всевышний приносит пользу кому пожелает." },
            { num: 92, name: "Ан-Нур", translation: "Просветляющий", desc: "Аллах освещает людям истинный путь." },
            { num: 93, name: "Аль-Хади", translation: "Направляющий", desc: "Создатель направляет истинным путём." },
            { num: 94, name: "Аль-Бади", translation: "Создающий в прекрасном облике", desc: "Творец придал всему прекрасный облик." },
            { num: 95, name: "Аль-Баки", translation: "Вечный", desc: "Господь не имеет временных границ." },
            { num: 96, name: "Аль-Варис", translation: "Наследник", desc: "Всевышний является Наследником всего сущего." },
            { num: 97, name: "Ар-Рашид", translation: "Направляющий на путь истины", desc: "Аллах ведёт верным путём." },
            { num: 98, name: "Ас-Сабур", translation: "Терпеливейший", desc: "Создатель обладает безграничным терпением." },
            { num: 99, name: "Аль-Джамиль", translation: "Прекрасный", desc: "Творец является источником всей красоты." }
        ];

        let flippedCards = new Set(JSON.parse(localStorage.getItem('flippedCards') || '[]'));
        let allCards = [];
        let currentMode = 'learn';

        // Quiz variables
        let quizQuestions = [];
        let currentQuestionIndex = 0;
        let quizScore = 0;
        let answeredQuestions = 0;

        // Learning Mode Functions
        function createCard(nameData, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';

            const card = document.createElement('div');
            card.className = 'card';
            if (flippedCards.has(nameData.num)) {
                card.classList.add('flipped');
            }

            const front = document.createElement('div');
            front.className = 'card-face card-front';
            front.innerHTML = `
                <div class="card-number">${nameData.num}</div>
                <div class="card-name">${nameData.name}</div>
            `;

            const back = document.createElement('div');
            back.className = 'card-face card-back';
            back.innerHTML = `
                <div class="card-translation">${nameData.translation}</div>
                <div class="card-description">${nameData.desc}</div>
            `;

            card.appendChild(front);
            card.appendChild(back);
            wrapper.appendChild(card);

            card.addEventListener('click', () => {
                card.classList.toggle('flipped');
                if (card.classList.contains('flipped')) {
                    flippedCards.add(nameData.num);
                } else {
                    flippedCards.delete(nameData.num);
                }
                localStorage.setItem('flippedCards', JSON.stringify([...flippedCards]));
                updateProgress();
            });

            allCards.push({ element: wrapper, data: nameData });
            return wrapper;
        }

        function updateProgress() {
            const learned = flippedCards.size;
            document.getElementById('learned').textContent = learned;
            const percentage = (learned / 99) * 100;
            document.getElementById('progressFill').style.width = `${percentage}%`;
        }

        function renderCards(cardsToRender = names) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            allCards = [];
            cardsToRender.forEach((nameData, index) => {
                grid.appendChild(createCard(nameData, index));
            });
        }

        function filterCards(searchTerm) {
            const filtered = names.filter(name => 
                name.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                name.translation.toLowerCase().includes(searchTerm.toLowerCase()) ||
                name.desc.toLowerCase().includes(searchTerm.toLowerCase())
            );
            renderCards(filtered);
        }

        // Quiz Mode Functions
        function generateQuizQuestions() {
            quizQuestions = [...names].sort(() => Math.random() - 0.5);
            currentQuestionIndex = 0;
            quizScore = 0;
            answeredQuestions = 0;
            updateQuizScore();
        }

        function generateOptions(correctAnswer) {
            const options = [correctAnswer];
            const otherNames = names.filter(n => n.translation !== correctAnswer);
            
            while (options.length < 4) {
                const randomName = otherNames[Math.floor(Math.random() * otherNames.length)];
                if (!options.includes(randomName.translation)) {
                    options.push(randomName.translation);
                }
            }
            
            return options.sort(() => Math.random() - 0.5);
        }

        function showQuestion() {
            if (currentQuestionIndex >= quizQuestions.length) {
                showQuizComplete();
                return;
            }

            const currentQuestion = quizQuestions[currentQuestionIndex];
            document.getElementById('quizQuestion').textContent = currentQuestion.name;
            
            const options = generateOptions(currentQuestion.translation);
            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';
            
            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'quiz-option';
                button.textContent = option;
                button.onclick = () => checkAnswer(button, option, currentQuestion.translation);
                optionsContainer.appendChild(button);
            });

            document.getElementById('quizResult').textContent = '';
            document.getElementById('quizResult').className = 'quiz-result';
            document.getElementById('quizNextBtn').classList.remove('active');
        }

        function checkAnswer(button, selectedAnswer, correctAnswer) {
            answeredQuestions++;
            const allOptions = document.querySelectorAll('.quiz-option');
            allOptions.forEach(opt => opt.classList.add('disabled'));

            if (selectedAnswer === correctAnswer) {
                button.classList.add('correct');
                document.getElementById('quizResult').textContent = '✓ Правильно!';
                document.getElementById('quizResult').className = 'quiz-result correct';
                quizScore++;
            } else {
                button.classList.add('incorrect');
                allOptions.forEach(opt => {
                    if (opt.textContent === correctAnswer) {
                        opt.classList.add('correct');
                    }
                });
                document.getElementById('quizResult').textContent = '✗ Неверно. Правильный ответ: ' + correctAnswer;
                document.getElementById('quizResult').className = 'quiz-result incorrect';
            }

            updateQuizScore();
            document.getElementById('quizNextBtn').classList.add('active');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            showQuestion();
        }

        function updateQuizScore() {
            document.getElementById('quizScore').textContent = quizScore;
            document.getElementById('quizTotal').textContent = answeredQuestions;
        }

        function showQuizComplete() {
            const percentage = Math.round((quizScore / quizQuestions.length) * 100);
            document.getElementById('quizQuestion').textContent = 'Экзамен завершён!';
            document.getElementById('quizOptions').innerHTML = `
                <div style="padding: 40px; text-align: center;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">${percentage >= 80 ? '🎉' : percentage >= 60 ? '👍' : '📚'}</div>
                    <div style="font-size: 1.5rem; color: var(--primary); margin-bottom: 10px;">
                        Вы ответили правильно на ${quizScore} из ${quizQuestions.length} вопросов
                    </div>
                    <div style="font-size: 2rem; font-weight: 600; color: var(--primary);">
                        ${percentage}%
                    </div>
                </div>
            `;
            document.getElementById('quizResult').textContent = '';
            document.getElementById('quizNextBtn').classList.remove('active');
        }

        function restartQuiz() {
            generateQuizQuestions();
            showQuestion();
        }

        // Mode Switching
        function switchMode(mode) {
            currentMode = mode;
            
            const modeBtns = document.querySelectorAll('.mode-btn');
            modeBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'learn') {
                document.getElementById('learningMode').classList.remove('hidden');
                document.getElementById('quizMode').classList.remove('active');
            } else {
                document.getElementById('learningMode').classList.add('hidden');
                document.getElementById('quizMode').classList.add('active');
                generateQuizQuestions();
                showQuestion();
            }
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterCards(e.target.value);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('Вы уверены, что хотите сбросить весь прогресс?')) {
                flippedCards.clear();
                localStorage.removeItem('flippedCards');
                document.querySelectorAll('.card').forEach(card => {
                    card.classList.remove('flipped');
                });
                updateProgress();
            }
        });

        document.getElementById('quizNextBtn').addEventListener('click', nextQuestion);

        // Initialize
        renderCards();
        updateProgress();
    </script>
</body>
</html>
